<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="overlay"></div>

<!-- Sidebar -->
<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-music"></i>
<h2>MusicPlay</h2>
</div>

<div class="profile">
<i class="fa-solid fa-circle-user"></i>
<span>Log in / Sign up</span>
</div>

<h4>Music</h4>

<ul>

<li><i class="fa-solid fa-house"></i> Home</li>

<li><i class="fa-solid fa-fire"></i> Trending</li>

<li><i class="fa-solid fa-star"></i> New</li>

<li class="active">
<i class="fa-solid fa-user"></i> Artists
</li>

<li><i class="fa-solid fa-video"></i> Videos</li>

<li><i class="fa-solid fa-list"></i> Playlists</li>

<li><i class="fa-solid fa-chart-column"></i> Charts</li>

<li><i class="fa-solid fa-music"></i> Genres</li>

</ul>

</div>

<!-- Login Modal -->

<div class="login-box">

<div class="tabs">
<h1>Log in</h1>
<h2>Sign up</h2>
</div>

<div class="switch">

<span class="selected">
<i class="fa-solid fa-circle-check"></i>
Phone Number
</span>

<span>Email Address</span>

</div>

<div class="input-group">

<div class="country">
+254
</div>

<input
type="text"
placeholder="Your Phone Number">

</div>

<div class="input-group">

<input
type="password"
placeholder="Password (6-16 characters)">

<i class="fa-regular fa-eye eye"></i>

</div>

<a href="#" class="forgot">
Forgot Password?
</a>

<button>
Log in
</button>

<div class="or">
<span>or</span>
</div>

<div class="social">

<div class="facebook">
<i class="fab fa-facebook-f"></i>
</div>

<div class="twitter">
<i class="fab fa-x-twitter"></i>
</div>

<div class="google">
<i class="fab fa-google"></i>
</div>

</div>

</div>

<div class="cookie">

This website uses cookies to improve your experience.

<button>Accept</button>

</div>

</body>
</html>
